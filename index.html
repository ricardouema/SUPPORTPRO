<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cateli | Especialistas em Demolição, Andaimes e Serviços Industriais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 scroll-smooth" x-data="languageManager()">

    <header class="bg-slate-900/95 backdrop-blur-md text-white sticky top-0 z-50 border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-2xl font-black tracking-wider text-amber-500">CATELI</span>
                <span class="text-xs uppercase tracking-widest text-slate-400 border-l border-slate-700 pl-2 hidden sm:inline" x-text="t[lang].subLogo">SERVICES</span>
            </div>

            <nav class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="#about" class="hover:text-amber-500 transition-colors" x-text="t[lang].navAbout"></a>
                <a href="#services" class="hover:text-amber-500 transition-colors" x-text="t[lang].navServices"></a>
                <a href="#careers" class="hover:text-amber-500 transition-colors" x-text="t[lang].navCareers"></a>
                <a href="#contact" class="hover:text-amber-500 transition-colors" x-text="t[lang].navContact"></a>
            </nav>

            <div class="hidden md:flex items-center space-x-4">
                <div class="relative" x-data="{ open: false }">
                    <button @click="open = !open" class="flex items-center space-x-2 text-sm bg-slate-800 px-3 py-1.5 rounded border border-slate-700 hover:bg-slate-700 transition">
                        <span class="font-bold text-amber-500" x-text="lang.toUpperCase()"></span>
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-32 bg-slate-800 rounded shadow-lg border border-slate-700 py-1" x-cloak>
                        <button @click="setLang('pt'); open = false" class="w-full text-left px-4 py-2 text-sm hover:bg-slate-700 flex items-center justify-between">Português <span class="text-xs text-slate-400">PT</span></button>
                        <button @click="setLang('jp'); open = false" class="w-full text-left px-4 py-2 text-sm hover:bg-slate-700 flex items-center justify-between">日本語 <span class="text-xs text-slate-400">JP</span></button>
                        <button @click="setLang('en'); open = false" class="w-full text-left px-4 py-2 text-sm hover:bg-slate-700 flex items-center justify-between">English <span class="text-xs text-slate-400">EN</span></button>
                    </div>
                </div>
                <a href="#contact" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-semibold px-4 py-2 rounded text-sm transition" x-text="t[lang].ctaQuote"></a>
            </div>

            <div class="md:hidden flex items-center space-x-4">
                <select @change="setLang($event.target.value)" class="bg-slate-800 text-white text-xs rounded px-2 py-1 border border-slate-700 focus:outline-none focus:border-amber-500">
                    <option value="pt" :selected="lang === 'pt'">PT</option>
                    <option value="jp" :selected="lang === 'jp'">JP</option>
                    <option value="en" :selected="lang === 'en'">EN</option>
                </select>
                <button @click="mobileMenu = !mobileMenu" class="text-white focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
            </div>
        </div>

        <div x-show="mobileMenu" class="md:hidden bg-slate-900 border-t border-slate-800 px-4 py-4 space-y-3" x-cloak>
            <a href="#about" @click="mobileMenu = false" class="block text-slate-300 hover:text-white" x-text="t[lang].navAbout"></a>
            <a href="#services" @click="mobileMenu = false" class="block text-slate-300 hover:text-white" x-text="t[lang].navServices"></a>
            <a href="#careers" @click="mobileMenu = false" class="block text-slate-300 hover:text-white" x-text="t[lang].navCareers"></a>
            <a href="#contact" @click="mobileMenu = false" class="block text-slate-300 hover:text-white" x-text="t[lang].navContact"></a>
            <a href="#contact" @click="mobileMenu = false" class="block w-full text-center bg-amber-500 text-slate-950 font-semibold py-2 rounded" x-text="t[lang].ctaQuote"></a>
        </div>
    </header>

    <section class="relative bg-slate-950 text-white h-[85vh] flex items-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1541888946425-d81bb19240f5?auto=format&fit=crop&q=80&w=1920" alt="Industrial Construction" class="w-full h-full object-cover opacity-35 object-center">
            <div class="absolute inset-0 bg-gradient-to-r from-slate-950 via-slate-950/80 to-transparent"></div>
        </div>
        
        <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
            <div class="max-w-3xl">
                <span class="text-amber-500 uppercase tracking-widest font-semibold text-sm block mb-3" x-text="t[lang].heroTag"></span>
                <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight mb-6 leading-tight" x-text="t[lang].heroTitle"></h1>
                <p class="text-lg sm:text-xl text-slate-300 mb-8 font-light" x-text="t[lang].heroDesc"></p>
                <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4">
                    <a href="#services" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold px-8 py-3.5 rounded shadow-lg text-center transition" x-text="t[lang].heroBtn1"></a>
                    <a href="#careers" class="border border-white hover:bg-white hover:text-slate-950 font-bold px-8 py-3.5 rounded text-center transition" x-text="t[lang].heroBtn2"></a>
                </div>
            </div>
        </div>
    </section>

    <section id="about" class="py-20 bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                <div>
                    <span class="text-amber-600 font-bold text-sm uppercase tracking-wider" x-text="t[lang].aboutSub"></span>
                    <h2 class="text-3xl sm:text-4xl font-bold text-slate-900 mt-2 mb-6" x-text="t[lang].aboutTitle"></h2>
                    <p class="text-slate-600 mb-6 leading-relaxed" x-text="t[lang].aboutP1"></p>
                    <p class="text-slate-600 mb-8 leading-relaxed" x-text="t[lang].aboutP2"></p>
                    
                    <div class="grid grid-cols-3 gap-4 border-t border-slate-100 pt-6">
                        <div>
                            <span class="block text-2xl font-bold text-slate-900">100%</span>
                            <span class="text-xs text-slate-500 uppercase tracking-wider" x-text="t[lang].stat1"></span>
                        </div>
                        <div>
                            <span class="block text-2xl font-bold text-slate-900">10</span>
                            <span class="text-xs text-slate-500 uppercase tracking-wider" x-text="t[lang].stat2"></span>
                        </div>
                        <div>
                            <span class="block text-2xl font-bold text-slate-900">+500</span>
                            <span class="text-xs text-slate-500 uppercase tracking-wider" x-text="t[lang].stat3"></span>
                        </div>
                    </div>
                </div>
                <div class="relative h-[450px] rounded-xl overflow-hidden shadow-2xl">
                    <img src="https://images.unsplash.com/photo-1605276374104-dee2a0ed3cd6?auto=format&fit=crop&q=80&w=1200" alt="Industrial Team" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
    </section>

    <section id="services" class="py-20 bg-slate-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center max-w-3xl mx-auto mb-16">
                <h2 class="text-3xl sm:text-4xl font-bold text-slate-900" x-text="t[lang].servicesTitle"></h2>
                <p class="text-slate-600 mt-4" x-text="t[lang].servicesSub"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                
                <div class="bg-white rounded-lg overflow-hidden shadow-md group hover:shadow-xl transition">
                    <div class="h-48 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1541625602330-2277a4c46182?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Demolição Profissional">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="t[lang].s1_title"></h3>
                        <ul class="text-sm text-slate-600 space-y-1" x-html="t[lang].s1_list"></ul>
                    </div>
                </div>

                <div class="bg-white rounded-lg overflow-hidden shadow-md group hover:shadow-xl transition">
                    <div class="h-48 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Prédio com Andaimes">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="t[lang].s2_title"></h3>
                        <ul class="text-sm text-slate-600 space-y-1" x-html="t[lang].s2_list"></ul>
                    </div>
                </div>

                <div class="bg-white rounded-lg overflow-hidden shadow-md group hover:shadow-xl transition">
                    <div class="h-48 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1616401784845-180882ba9ba8?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Caminhão Dump de Entulho">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="t[lang].s3_title"></h3>
                        <ul class="text-sm text-slate-600 space-y-1" x-html="t[lang].s3_list"></ul>
                    </div>
                </div>

                <div class="bg-white rounded-lg overflow-hidden shadow-md group hover:shadow-xl transition">
                    <div class="h-48 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1581094288338-2314dddb7ece?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Reforma Comercial">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="t[lang].s4_title"></h3>
                        <ul class="text-sm text-slate-600 space-y-1" x-html="t[lang].s4_list"></ul>
                    </div>
                </div>

                <div class="bg-white rounded-lg overflow-hidden shadow-md group hover:shadow-xl transition">
                    <div class="h-48 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Corte de Concreto Profissional">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="t[lang].s5_title"></h3>
                        <ul class="text-sm text-slate-600 space-y-1" x-html="t[lang].s5_list"></ul>
                    </div>
                </div>

                <div class="bg-white rounded-lg overflow-hidden shadow-md group hover:shadow-xl transition">
                    <div class="h-48 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Logística Industrial">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="t[lang].s6_title"></h3>
                        <ul class="text-sm text-slate-600 space-y-1" x-html="t[lang].s6_list"></ul>
                    </div>
                </div>

                <div class="bg-white rounded-lg overflow-hidden shadow-md group hover:shadow-xl transition">
                    <div class="h-48 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Reciclagem de Metais">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="t[lang].s7_title"></h3>
                        <ul class="text-sm text-slate-600 space-y-1" x-html="t[lang].s7_list"></ul>
                    </div>
                </div>

                <div class="bg-white rounded-lg overflow-hidden shadow-md group hover:shadow-xl transition">
                    <div class="h-48 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1584467541268-b040f83be3fd?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Remoção Especializada de Amianto">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="t[lang].s8_title"></h3>
                        <ul class="text-sm text-slate-600 space-y-1" x-html="t[lang].s8_list"></ul>
                    </div>
                </div>

                <div class="bg-white rounded-lg overflow-hidden shadow-md group hover:shadow-xl transition">
                    <div class="h-48 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1513828583835-c5417117a4d9?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Desmontagem de Linha Industrial">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="t[lang].s9_title"></h3>
                        <ul class="text-sm text-slate-600 space-y-1" x-html="t[lang].s9_list"></ul>
                    </div>
                </div>

                <div class="bg-white rounded-lg overflow-hidden shadow-md group hover:shadow-xl transition md:col-span-2 lg:col-span-3 lg:max-w-md lg:mx-auto w-full">
                    <div class="h-48 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Planejamento Operacional">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="t[lang].s10_title"></h3>
                        <ul class="text-sm text-slate-600 space-y-1" x-html="t[lang].s10_list"></ul>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <section id="careers" class="py-20 bg-slate-900 text-white relative">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&q=80&w=1920" class="w-full h-full object-cover opacity-5" alt="Background recruitment">
        </div>
        <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                <div>
                    <span class="text-amber-500 font-bold text-sm uppercase tracking-wider" x-text="t[lang].recruitSub"></span>
                    <h2 class="text-3xl sm:text-4xl font-bold mt-2 mb-6" x-text="t[lang].recruitTitle"></h2>
                    <p class="text-slate-300 mb-8" x-text="t[lang].recruitDesc
